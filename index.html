    <style>
        /* Sistema de Temas e Variáveis CSS */
        :root, [data-theme="dark"] {
            --bg: linear-gradient(135deg, #0f0f1e, #1a1a2e);
            --cell: #161b22;
            --cell-hover: #1f2631;
            --border: #30363d;
            --text: #c9d1d9;
            --x: #ff7b72;
            --o: #79c0ff;
            --win: #3fb950;
            --accent: #58a6ff;
            --shadow: rgba(0, 0, 0, 0.3);
            --footer-bg: rgba(22, 27, 34, 0.8);
        }
        [data-theme="light"] {
            --bg: linear-gradient(135deg, #f6f8fa, #e1e4e8);
            --cell: #ffffff;
            --cell-hover: #f3f4f6;
            --border: #d0d7de;
            --text: #1f2328;
            --x: #cf222e;
            --o: #0969da;
            --win: #1a7f37;
            --accent: #0969da;
            --shadow: rgba(0, 0, 0, 0.05);

        [data-theme="neon"] {
            --bg: linear-gradient(135deg, #000000, #120136);
            --cell: #2d004d;
            --cell-hover: #40006b;
            --border: #ff00ff;
            --text: #00ffea;
            --x: #ff007f;
            --o: #00ffea;
            --win: #00ff66;
            --accent: #00ffea;

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 10px 120px 10px;
        }

        h1 { color: var(--accent); margin-bottom: 20px; text-align: center; font-size: 24px; }

        .top-bar, .controles-container, .inputs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .input-grupo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .input-grupo label { font-size: 11px; text-transform: uppercase; opacity: 0.7; }

        button, input, select {
            background: var(--cell);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;

            cursor: pointer;
            transition: all 0.2s ease;

        input { cursor: text; width: 110px; text-align: center; }
        input.simbolo-input { width: 50px; }
        button:hover { background: var(--cell-hover); }
        button.ativo { background: var(--accent); color: #fff; border-color: var(--accent); }

        #placar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        #placar {
            display: flex;
            gap: 25px;
            font-size: 16px;
            background: var(--cell);
            padding: 12px 24px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        #placar span { font-weight: bold; }

        #cronometro {
            font-size: 14px;
            background: rgba(218, 54, 51, 0.1);
            color: #ff7b72;
            border: 1px solid rgba(218, 54, 51, 0.3);

        #status { font-size: 20px; margin: 10px 0 15px 0; height: 25px; font-weight: 600; text-align: center; }
        
        #board {

            max-width: 320px;

        .cell {

            font-size: 11px;
            padding: 4px 0;
            border-bottom: 1px dashed var(--border);
            display: flex;
            justify-content: space-between;
        }

        /* Melhoria 1: Chat P2P Online */
        .online-panel {
            background: var(--cell);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            max-width: 320px;

        .online-status-badge {

        #chat-container {
            display: none;
            flex-direction: column;

        #chat-mensagens {
            height: 80px;

        .msg-chat {

        .msg-chat.minha { background: var(--accent); color: #fff; align-self: flex-end; }
        .msg-chat.outro { background: var(--border); color: var(--text); align-self: flex-start; }
        .chat-input-area { display: flex; gap: 4px; }

        /* Melhoria 4: Customizador de Cores CSS */
        .color-customizer {
            display: flex;

        }

    </style>
</head>

<script>
let audioCtx = null;
let somMutado = false; // Melhoria 5

function iniciarAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function toggleMute() {
    somMutado = !somMutado;
    document.getElementById('btn-mute').textContent = somMutado ? "🔇 Sem Som" : "🔊 Som Ligado";
}

function tocarSom(tipo) {
    if (somMutado) return;
    iniciarAudio();
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const agora = audioCtx.currentTime;

    if (tipo === 'clique') {
        osc.frequency.setValueAtTime(400, agora);
        gain.gain.setValueAtTime(0.1, agora);
        osc.start(agora); osc.stop(agora + 0.08);
    } else if (tipo === 'vitoria') {
        osc.frequency.setValueAtTime(523.25, agora);
        gain.gain.setValueAtTime(0.15, agora);
        osc.start(agora); osc.stop(agora + 0.3);
    } else if (tipo === 'empate') {
        osc.frequency.setValueAtTime(200, agora);
        gain.gain.setValueAtTime(0.15, agora);
        osc.start(agora); osc.stop(agora + 0.2);
    }
}

document.addEventListener('click', iniciarAudio, { once: true });

const board = document.getElementById('board'),
      status = document.getElementById('status'),
      scoreX = document.getElementById('scoreX'),
      scoreO = document.getElementById('scoreO'),
      scoreVelha = document.getElementById('scoreVelha'),
      labelX = document.getElementById('labelX'),
      labelO = document.getElementById('labelO'),
      nomeX = document.getElementById('nomeX'),
      nomeO = document.getElementById('nomeO'),
      simbX = document.getElementById('simbX'),
      simbO = document.getElementById('simbO'),
      elementoTempo = document.getElementById('tempo'),
      totalPartidasElement = document.getElementById('total-partidas'),
      panelOnline = document.getElementById('online-panel'),
      statusOnline = document.getElementById('online-status'),
      meuIdInput = document.getElementById('meu-id'),
      idAdversarioInput = document.getElementById('id-adversario'),
      chatContainer = document.getElementById('chat-container'),
      chatMensagens = document.getElementById('chat-mensagens'),
      chatInput = document.getElementById('chat-input'),
      historicoLista = document.getElementById('historico-lista');

let tamanho = 3, 
    cells = Array(9).fill(''), 
    currentPlayer = 'X', 
    gameActive = true, 
    modo = 'pvp', 
    placar = {X: 0, O: 0, Velha: 0}, 
    historico = [], 
    sequenciaVitoria = 3, 
    pcPensando = false;

let tempoSegundos = 0;
let intervaloCronometro = null;

// Variáveis do PeerJS
let peer = null;
let conn = null;
let meuSimboloOnline = 'X'; 

// Carregar Dados Salvos do LocalStorage
let totalPartidas = parseInt(localStorage.getItem('velha_total_partidas') || '0');
totalPartidasElement.textContent = totalPartidas;

let logsPartidas = JSON.parse(localStorage.getItem('velha_logs_partidas') || '[]');

if(localStorage.getItem('velha_placar')) {
    placar = JSON.parse(localStorage.getItem('velha_placar'));
    nomeX.value = localStorage.getItem('velha_nomeX') || 'X';
    nomeO.value = localStorage.getItem('velha_nomeO') || 'O';
    simbX.value = localStorage.getItem('velha_simbX') || 'X';
    simbO.value = localStorage.getItem('velha_simbO') || 'O';
}

function setTema(t) { document.documentElement.setAttribute('data-theme', t); }

// Melhoria 4: Customizador Dinâmico de CSS Variables
function mudarCorCustomizada(varName, val) {
    document.documentElement.style.setProperty(varName, val);
}

function iniciarCronometro() {
    pararCronometro();
    tempoSegundos = 0;
    elementoTempo.textContent = '0s';
    intervaloCronometro = setInterval(() => {
        if (gameActive && !pcPensando) {
            tempoSegundos++;
            elementoTempo.textContent = tempoSegundos + 's';
        }
    }, 1000);
}

function pararCronometro() { if (intervaloCronometro) clearInterval(intervaloCronometro); }

// Melhoria 3: Adicionar registro ao histórico detalhado local
function registrarFimDePartida(resultado) {
    totalPartidas++;
    totalPartidasElement.textContent = totalPartidas;
    localStorage.setItem('velha_total_partidas', totalPartidas);

    const log = {
        data: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
        modo: modo === 'online' ? 'Online' : modo.startsWith('pvb') ? 'Contra PC' : 'Local',
        p1: nomeX.value || 'X',
        p2: nomeO.value || 'O',
        resultado: resultado,
        tempo: tempoSegundos + 's'
    };

    logsPartidas.unshift(log); // Coloca no topo
    if(logsPartidas.length > 5) logsPartidas.pop(); // Mantém os últimos 5 logs
    localStorage.setItem('velha_logs_partidas', JSON.stringify(logsPartidas));
    renderizarHistorico();
}

function toggleHistorico() {
    historicoLista.style.display = historicoLista.style.display === 'block' ? 'none' : 'block';
    renderizarHistorico();
}

function renderizarHistorico() {
    historicoLista.innerHTML = '';
    if(logsPartidas.length === 0) {
        historicoLista.innerHTML = `<div style="font-size:11px; opacity:0.6; text-align:center;">Nenhuma partida recente.</div>`;
        return;
    }
    logsPartidas.forEach(log => {
        const item = document.createElement('div');
        item.className = 'historico-item';
        item.innerHTML = `
            <span>[${log.data}] ${log.p1} x ${log.p2} (${log.modo})</span>
            <strong style="color:var(--accent);">${log.resultado} em ${log.tempo}</strong>
        `;
        historicoLista.appendChild(item);
    });
}

function atualizarLabels() {
    let sX = simbX.value.trim() || 'X';
    let sO = simbO.value.trim() || 'O';
    labelX.textContent = `${nomeX.value || 'X'} (${sX})`;
    labelO.textContent = `${nomeO.value || 'O'} (${sO})`;
    localStorage.setItem('velha_nomeX', nomeX.value);
    localStorage.setItem('velha_nomeO', nomeO.value);
    localStorage.setItem('velha_simbX', sX);
    localStorage.setItem('velha_simbO', sO);
    atualizarStatus();
    renderBoard();
}

function setTamanho(n) {
    if (modo === 'online') return; 
    tamanho = n;
    sequenciaVitoria = n === 3 ? 3 : 4;
    cells = Array(n * n).fill('');
    document.querySelectorAll('#tamanho button').forEach(b => b.classList.remove('ativo'));
    document.getElementById('t' + n).classList.add('ativo');
    resetRodada();
}

function gerarWinConditions() {
    const c = [], s = tamanho, w = sequenciaVitoria;
    for (let i = 0; i < s; i++) for (let j = 0; j <= s - w; j++) { const l = []; for (let k = 0; k < w; k++) l.push(i * s + j + k); c.push(l); }
    for (let j = 0; j < s; j++) for (let i = 0; i <= s - w; i++) { const l = []; for (let k = 0; k < w; k++) l.push((i + k) * s + j); c.push(l); }
    for (let i = 0; i <= s - w; i++) for (let j = 0; j <= s - w; j++) { const l = []; for (let k = 0; k < w; k++) l.push((i + k) * s + j + k); c.push(l); }
    for (let i = 0; i <= s - w; i++) for (let j = w - 1; j < s; j++) { const l = []; for (let k = 0; k < w; k++) l.push((i + k) * s + j - k); c.push(l); }
    return c;
}

function renderBoard(v = null) {
    board.innerHTML = '';
    board.style.gridTemplateColumns = `repeat(${tamanho}, 1fr)`;
    
    const fontSizeIdeal = tamanho === 3 ? '2rem' : tamanho === 4 ? '1.5rem' : '1.2rem';
    
    cells.forEach((val, i) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'cell-wrapper';
        
        const d = document.createElement('div');
        d.className = 'cell';
        d.style.fontSize = fontSizeIdeal;
        
        if (val) d.classList.add(val.toLowerCase());
        if (v && v.includes(i)) d.classList.add('vencedora');
        
        if (val === 'X') d.textContent = simbX.value.trim() || 'X';
        else if (val === 'O') d.textContent = simbO.value.trim() || 'O';
        else d.textContent = '';

        d.onclick = () => makeMove(i);
        
        wrapper.appendChild(d);
        board.appendChild(wrapper);
    });
}

function setModo(m) {
    modo = m;
    document.querySelectorAll('#controles button').forEach(b => b.classList.remove('ativo'));
    document.getElementById(m).classList.add('ativo');
    
    if (m === 'online') {
        panelOnline.style.display = 'flex';
        iniciarPeerJS();
    } else {
        panelOnline.style.display = 'none';
        chatContainer.style.display = 'none';
        fecharConexaoMultiplayer();
        if (m !== 'pvp') { nomeO.value = 'PC'; nomeO.disabled = true; } 
        else { if(nomeO.value === 'PC') nomeO.value = 'O'; nomeO.disabled = false; }
    }
    atualizarLabels();
    resetRodada();
}

function makeMove(i, doRede = false) {
    if (cells[i] || !gameActive || pcPensando) return;
    
    if (modo === 'online' && !doRede && currentPlayer !== meuSimboloOnline) return;
    if (modo.startsWith('pvb') && currentPlayer === 'O' && !doRede) return;
    
    historico.push([...cells]);
    cells[i] = currentPlayer;
    tocarSom('clique');
    renderBoard();
    
    if (modo === 'online' && !doRede && conn && conn.open) {
        conn.send({ tipo: 'jogada', index: i });
    }
    
    const v = checkWinner();
    if (v) {
        status.textContent = `${getNomeAtual()} venceu!`;
        tocarSom('vitoria');
        
        // Melhoria 2: Disparar confetes reais ao vencer
        confetti({
            particleCount: 150,
            spread: 80,
            origin: { y: 0.6 }
        });

        placar[currentPlayer]++;
        gameActive = false;
        pararCronometro();
        renderBoard(v);
        atualizarPlacar();
        registrarFimDePartida(`Vitória de ${getNomeAtual()}`);
        return;
    }
    if (!cells.includes('')) {
        status.textContent = 'Deu velha!';
        tocarSom('empate');
        placar.Velha++;
        gameActive = false;
        pararCronometro();
        atualizarPlacar();
        registrarFimDePartida('Deu velha!');
        return;
    }
    
    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    atualizarStatus();
    
    if (modo.startsWith('pvb') && currentPlayer === 'O' && gameActive) {
        pcPensando = true;
        setTimeout(() => { jogadaPC(); pcPensando = false; }, 100);
    }
}

function getNomeAtual() { return currentPlayer === 'X' ? (nomeX.value || 'X') : (nomeO.value || 'O'); }
function atualizarStatus() { 
    if (gameActive) {
        if (modo === 'online') {
            status.textContent = (currentPlayer === meuSimboloOnline) ? "Sua vez!" : "Aguardando adversário...";
        } else {
            status.textContent = `Vez do ${getNomeAtual()}`;
        }
    } 
}

function desfazerJogada() {
    if (modo === 'online') return; 
    if (historico.length === 0 || !gameActive) return;
    cells = historico.pop();
    if (modo.startsWith('pvb') && historico.length % 2 === 1) cells = historico.pop();
    currentPlayer = 'X';
    atualizarStatus();
    renderBoard();
}

/* SISTEMA MULTIPLAYER P2P COM PEERJS */
function iniciarPeerJS() {
    fecharConexaoMultiplayer();
    statusOnline.textContent = "Iniciando Rede...";
    statusOnline.style.background = "#e1a100";

    peer = new Peer();

    peer.on('open', (id) => {
        meuIdInput.value = id;
        statusOnline.textContent = "Aguardando Oponente...";
        statusOnline.style.background = "#238636";
    });

    peer.on('connection', (conexao) => {
        conn = conexao;
        meuSimboloOnline = 'X'; 
        gerenciarEventosDeRede();
    });

    peer.on('error', (err) => {
        console.error(err);
        statusOnline.textContent = "Erro na rede.";
        statusOnline.style.background = "#da3633";
    });
}

function conectarAdversario() {
    const idAdv = idAdversarioInput.value.trim();
    if (!idAdv) return alert("Por favor, digite ou cole o ID do seu parceiro!");
    
    statusOnline.textContent = "Conectando...";
    statusOnline.style.background = "#e1a100";
    
    conn = peer.connect(idAdv);
    meuSimboloOnline = 'O'; 
    gerenciarEventosDeRede();
}

function gerenciarEventosDeRede() {
    conn.on('open', () => {
        statusOnline.textContent = "Conectado!";
        statusOnline.style.background = "#238636";
        chatContainer.style.display = 'flex'; // Abre o chat
        
        conn.send({
            tipo: 'identidade',
            nome: meuSimboloOnline === 'X' ? (nomeX.value || 'X') : (nomeO.value || 'O')
        });
        
        resetRodada();
    });

    conn.on('data', (dados) => {
        if (dados.tipo === 'identidade') {
            if (meuSimboloOnline === 'X') {
                nomeO.value = dados.nome;
            } else {
                nomeX.value = dados.nome;
            }
            atualizarLabels();
        } else if (dados.tipo === 'jogada') {
            makeMove(dados.index, true);
        } else if (dados.tipo === 'reset') {
            reiniciarTabuleiroLocal();
        } else if (dados.tipo === 'chat') {
            adicionarMensagemChatVisual(dados.autor, dados.mensagem, 'outro');
        }
    });

    conn.on('close', () => {
        statusOnline.textContent = "Adversário desconectou.";
        statusOnline.style.background = "#da3633";
        chatContainer.style.display = 'none';
        conn = null;
    });
}

// Melhoria 1: Funções do Chat P2P
function checarEnvioChat(e) {
    if(e.key === 'Enter') enviarMensagemChat();
}

function enviarMensagemChat() {
    const txt = chatInput.value.trim();
    if(!txt || !conn || !conn.open) return;
    
    const meuNome = meuSimboloOnline === 'X' ? (nomeX.value || 'X') : (nomeO.value || 'O');
    
    // Envia a mensagem pela rede
    conn.send({
        tipo: 'chat',
        autor: meuNome,
        mensagem: txt
    });
    
    adicionarMensagemChatVisual(meuNome, txt, 'minha');
    chatInput.value = '';
}

function adicionarMensagemChatVisual(autor, texto, classe) {
    const div = document.createElement('div');
    div.className = `msg-chat ${classe}`;
    div.innerHTML = `<strong>${autor}:</strong> ${texto}`;
    chatMensagens.appendChild(div);
    chatMensagens.scrollTop = chatMensagens.scrollHeight; // Auto-scroll
}

function fecharConexaoMultiplayer() {
    if (conn) conn.close();
    if (peer) peer.destroy();
    conn = null;
    peer = null;
}

/* SISTEMA MINIMAX */
function jogadaPC() {
    if (!gameActive) return;
    let j = -1;
    const w = gerarWinConditions();
    
    if (modo === 'pvb') {
        const l = cells.map((v, i) => v === '' ? i : null).filter(v => v !== null);
        j = l[Math.floor(Math.random() * l.length)];
    } 
    else if (modo === 'pvb-medio') {
        for (let c of w) {
            const v = c.map(i => cells[i]);
            if (v.filter(x => x === 'O').length === sequenciaVitoria - 1 && v.includes('')) { j = c[v.indexOf('')]; break; }
        }
        if (j === -1) {
            for (let c of w) {
                const v = c.map(i => cells[i]);
                if (v.filter(x => x === 'X').length === sequenciaVitoria - 1 && v.includes('')) { j = c[v.indexOf('')]; break; }
            }
        }
        if (j === -1) {
            const l = cells.map((v, i) => v === '' ? i : null).filter(v => v !== null);
            j = l[Math.floor(Math.random() * l.length)];
        }
    } 
    else if (modo === 'pvb-dificil') {
        let maxProfundidade = tamanho === 3 ? 9 : tamanho === 4 ? 4 : 3; 
        j = melhorJogadaMinimax(maxProfundidade, w);
    }
    
    if (j !== -1) makeMove(j, true);
}

function melhorJogadaMinimax(maxProf, w) {
    let m = -Infinity, mj = -1;
    for (let i = 0; i < cells.length; i++) if (cells[i] === '') {
        cells[i] = 'O';
        let s = minimax(cells, 0, -Infinity, Infinity, false, maxProf, w);
        cells[i] = '';
        if (s > m) { m = s; mj = i; }
    }
    return mj;
}

function minimax(b, d, alfa, beta, max, maxProf, w) {
    const v = checarVencedorMinimax(b, w);
    if (v === 'O') return 10 - d;
    if (v === 'X') return d - 10;
    if (!b.includes('') || d >= maxProf) return 0;
    
    if (max) {
        let m = -Infinity;
        for (let i = 0; i < b.length; i++) if (b[i] === '') {
            b[i] = 'O';
            let s = minimax(b, d + 1, alfa, beta, false, maxProf, w);
            b[i] = '';
            m = Math.max(s, m);
            alfa = Math.max(alfa, m);
            if (beta <= alfa) break;
        }
        return m;
    } else {
        let m = Infinity;
        for (let i = 0; i < b.length; i++) if (b[i] === '') {
            b[i] = 'X';
            let s = minimax(b, d + 1, alfa, beta, true, maxProf, w);
            b[i] = '';
            m = Math.min(s, m);
            beta = Math.min(beta, m);
            if (beta <= alfa) break;
        }
        return m;
    }
}

function checarVencedorMinimax(b, w) { for (let c of w) { const p = b[c[0]]; if (p && c.every(i => b[i] === p)) return p; } return null; }
function checkWinner() { const w = gerarWinConditions(); for (let c of w) { const p = cells[c[0]]; if (p && c.every(i => cells[i] === p)) return c; } return null; }

function atualizarPlacar() {
    scoreX.textContent = placar.X; scoreO.textContent = placar.O; scoreVelha.textContent = placar.Velha;
    localStorage.setItem('velha_placar', JSON.stringify(placar));
}

function resetRodada() {
    if (modo === 'online' && conn && conn.open) {
        conn.send({ tipo: 'reset' });
    }
    reiniciarTabuleiroLocal();
}

function reiniciarTabuleiroLocal() {
    cells = Array(tamanho * tamanho).fill('');
    currentPlayer = 'X'; gameActive = true; historico = []; pcPensando = false;
    atualizarStatus(); renderBoard(); iniciarCronometro();
}

function zerarPlacar() { placar = {X: 0, O: 0, Velha: 0}; atualizarPlacar(); resetRodada(); }

function compartilharWhatsApp() {
    const p1 = nomeX.value || "Jogador X";
    const p2 = nomeO.value || "Jogador O";
    const vitoriasX = placar.X;
    const vitoriasO = placar.O;
    const empates = placar.Velha;

    let mensagem = `🎮 *Jogo da Velha Pro Max* 🎮\n\n`;
    mensagem += `⚔️ *Placar Atual:*\n`;
    mensagem += `• ${p1}: ${vitoriasX} vitória(s)\n`;
    mensagem += `• ${p2}: ${vitoriasO} vitória(s)\n`;
    mensagem += `• Velhas (Empates): ${empates}\n\n`;

    if (vitoriasX > vitoriasO) {
        mensagem += `🔥 *Mandei ${vitoriasX}x${vitoriasO} no ${p2}!* Respeita o líder! 😎🚀`;
    } else if (vitoriasO > vitoriasX) {
        mensagem += `👀 Ih rapaz, o ${p2} tá na frente por ${vitoriasO}x${vitoriasX}... Mas a revanche vem! 🕹️`;
    } else {
        mensagem += `🤝 Tudo igual no placar (${vitoriasX}x${vitoriasO})! Quem aceita o próximo desafio? 🚀`;
    }

    const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(mensagem)}`;
    window.open(url, '_blank');
}

atualizarLabels(); atualizarPlacar(); renderBoard(); iniciarCronometro(); renderizarHistorico();
