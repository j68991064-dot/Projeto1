<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Velha Pro Max</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Jogo da Velha Pro Max</h1>

<div class="top-bar">
    <button onclick="setTema('light')">☀️ Claro</button>
    <button onclick="setTema('dark')">🌙 Escuro</button>
    <button onclick="setTema('neon')">🔮 Neon</button>
</div>
 
<div class="inputs-container">
    <div class="input-grupo">
        <label>Jogador 1</label>
        <div style="display:flex; gap:2px;">
            <input id="nomeX" placeholder="Nome" value="X" maxlength="10">
            <input id="simbX" class="simbolo-input" placeholder="Símb." value="X" maxlength="2">
        </div>
    </div>
    <div class="input-grupo">
        <label>Jogador 2</label>
        <div style="display:flex; gap:2px;">
            <input id="nomeO" placeholder="Nome" value="O" maxlength="10">
            <input id="simbO" class="simbolo-input" placeholder="Símb." value="O" maxlength="2">
        </div>
    </div>
</div>
 
<div id="placar-wrapper">
    <div id="placar">
        <div><span id="labelX">X</span>: <span id="scoreX">0</span></div>
        <div>Velha: <span id="scoreVelha">0</span></div>
        <div><span id="labelO">O</span>: <span id="scoreO">0</span></div>
    </div>
    <div id="cronometro">Tempo da Rodada: <span id="tempo">0s</span></div>
</div>
 
<div class="controles-container" id="tamanho">
    <button id="t3" class="ativo" onclick="setTamanho(3)">3x3</button>
    <button id="t4" onclick="setTamanho(4)">4x4</button>
    <button id="t5" onclick="setTamanho(5)">5x5</button>
</div>

<div class="controles-container" id="controles">
    <button id="pvp" class="ativo" onclick="setModo('pvp')">2 Jogadores</button>
    <button id="pvb" onclick="setModo('pvb')">Vs PC Fácil</button>
    <button id="pvb-medio" onclick="setModo('pvb-medio')">Vs PC Médio</button>
    <button id="pvb-dificil" onclick="setModo('pvb-dificil')">Vs PC Difícil</button>
</div>

<div id="status">Vez do X</div>
<div id="board"></div>

<div id="botoes-acao">
    <button id="reset" onclick="resetRodada()">Nova Rodada</button>
    <button id="desfazer" onclick="desfazerJogada()">Desfazer</button>
    <button id="zerar" onclick="zerarPlacar()">Zerar Placar</button>
</div>

<footer>
    <span>Desenvolvido ❤️ por <i>Johny Sniper 👑</i></span>
</footer>
  
<script>
let audioCtx = null;
function iniciarAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function tocarSom(tipo) {
    iniciarAudio();
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const agora = audioCtx.currentTime;

    if (tipo === 'clique') {
        osc.frequency.setValueAtTime(400, agora);
        gain.gain.setValueAtTime(0.1, agora);
        osc.start(agora); osc.stop(agora + 0.08);
    } else if (tipo === 'vitoria') {
        osc.frequency.setValueAtTime(523.25, agora);
        gain.gain.setValueAtTime(0.15, agora);
        osc.start(agora); osc.stop(agora + 0.3);
    } else if (tipo === 'empate') {
        osc.frequency.setValueAtTime(200, agora);
        gain.gain.setValueAtTime(0.15, agora);
        osc.start(agora); osc.stop(agora + 0.2);
    }
}

document.addEventListener('click', iniciarAudio, { once: true });

const board = document.getElementById('board'),
      status = document.getElementById('status'),
      scoreX = document.getElementById('scoreX'),
      scoreO = document.getElementById('scoreO'),
      scoreVelha = document.getElementById('scoreVelha'),
      labelX = document.getElementById('labelX'),
      labelO = document.getElementById('labelO'),
      nomeX = document.getElementById('nomeX'),
      nomeO = document.getElementById('nomeO'),
      simbX = document.getElementById('simbX'),
      simbO = document.getElementById('simbO'),
      elementoTempo = document.getElementById('tempo');

let tamanho = 3, 
    cells = Array(9).fill(''), 
    currentPlayer = 'X', 
    gameActive = true, 
    modo = 'pvp', 
    placar = {X: 0, O: 0, Velha: 0}, 
    historico = [], 
    sequenciaVitoria = 3, 
    pcPensando = false;

let tempoSegundos = 0;
let intervaloCronometro = null;

if(localStorage.getItem('velha_placar')) {
    placar = JSON.parse(localStorage.getItem('velha_placar'));
    nomeX.value = localStorage.getItem('velha_nomeX') || 'X';
    nomeO.value = localStorage.getItem('velha_nomeO') || 'O';
    simbX.value = localStorage.getItem('velha_simbX') || 'X';
    simbO.value = localStorage.getItem('velha_simbO') || 'O';
}

function setTema(t) { document.documentElement.setAttribute('data-theme', t); }
nomeX.oninput = nomeO.oninput = simbX.oninput = simbO.oninput = atualizarLabels;

function iniciarCronometro() {
    pararCronometro();
    tempoSegundos = 0;
    elementoTempo.textContent = '0s';
    intervaloCronometro = setInterval(() => {
        if (gameActive && !pcPensando) {
            tempoSegundos++;
            elementoTempo.textContent = tempoSegundos + 's';
        }
    }, 1000);
}

function pararCronometro() { if (intervaloCronometro) clearInterval(intervaloCronometro); }

function atualizarLabels() {
    let sX = simbX.value.trim() || 'X';
    let sO = simbO.value.trim() || 'O';
    labelX.textContent = `${nomeX.value || 'X'} (${sX})`;
    labelO.textContent = `${nomeO.value || 'O'} (${sO})`;
    localStorage.setItem('velha_nomeX', nomeX.value);
    localStorage.setItem('velha_nomeO', nomeO.value);
    localStorage.setItem('velha_simbX', sX);
    localStorage.setItem('velha_simbO', sO);
    atualizarStatus();
    renderBoard();
}

function setTamanho(n) {
    tamanho = n;
    sequenciaVitoria = n === 3 ? 3 : 4;
    cells = Array(n * n).fill('');
    document.querySelectorAll('#tamanho button').forEach(b => b.classList.remove('ativo'));
    document.getElementById('t' + n).classList.add('ativo');
    resetRodada();
}

function gerarWinConditions() {
    const c = [], s = tamanho, w = sequenciaVitoria;
    for (let i = 0; i < s; i++) for (let j = 0; j <= s - w; j++) { const l = []; for (let k = 0; k < w; k++) l.push(i * s + j + k); c.push(l); }
    for (let j = 0; j < s; j++) for (let i = 0; i <= s - w; i++) { const l = []; for (let k = 0; k < w; k++) l.push((i + k) * s + j); c.push(l); }
    for (let i = 0; i <= s - w; i++) for (let j = 0; j <= s - w; j++) { const l = []; for (let k = 0; k < w; k++) l.push((i + k) * s + j + k); c.push(l); }
    for (let i = 0; i <= s - w; i++) for (let j = w - 1; j < s; j++) { const l = []; for (let k = 0; k < w; k++) l.push((i + k) * s + j - k); c.push(l); }
    return c;
}

function renderBoard(v = null) {
    board.innerHTML = '';
    board.style.gridTemplateColumns = `repeat(${tamanho}, 1fr)`;
    
    const fontSizeIdeal = tamanho === 3 ? '2rem' : tamanho === 4 ? '1.5rem' : '1.2rem';
    
    cells.forEach((val, i) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'cell-wrapper';
        
        const d = document.createElement('div');
        d.className = 'cell';
        d.style.fontSize = fontSizeIdeal;
        
        if (val) d.classList.add(val.toLowerCase());
        if (v && v.includes(i)) d.classList.add('vencedora');
        
        if (val === 'X') d.textContent = simbX.value.trim() || 'X';
        else if (val === 'O') d.textContent = simbO.value.trim() || 'O';
        else d.textContent = '';

        d.onclick = () => makeMove(i);
        
        wrapper.appendChild(d);
        board.appendChild(wrapper);
    });
}

function setModo(m) {
    modo = m;
    document.querySelectorAll('#controles button').forEach(b => b.classList.remove('ativo'));
    document.getElementById(m).classList.add('ativo');
    if (m !== 'pvp') { nomeO.value = 'PC'; nomeO.disabled = true; } 
    else { if(nomeO.value === 'PC') nomeO.value = 'O'; nomeO.disabled = false; }
    atualizarLabels();
    resetRodada();
}

function makeMove(i, pc = false) {
    if (cells[i] || !gameActive || pcPensando) return;
    if (modo.startsWith('pvb') && currentPlayer === 'O' && !pc) return;
    
    historico.push([...cells]);
    cells[i] = currentPlayer;
    tocarSom('clique');
    renderBoard();
    
    const v = checkWinner();
    if (v) {
        status.textContent = `${getNomeAtual()} venceu!`;
        tocarSom('vitoria');
        placar[currentPlayer]++;
        gameActive = false;
        pararCronometro();
        renderBoard(v);
        atualizarPlacar();
        return;
    }
    if (!cells.includes('')) {
        status.textContent = 'Deu velha!';
        tocarSom('empate');
        placar.Velha++;
        gameActive = false;
        pararCronometro();
        atualizarPlacar();
        return;
    }
    
    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    atualizarStatus();
    
    if (modo.startsWith('pvb') && currentPlayer === 'O' && gameActive) {
        pcPensando = true;
        setTimeout(() => { jogadaPC(); pcPensando = false; }, 100);
    }
}

function getNomeAtual() { return currentPlayer === 'X' ? (nomeX.value || 'X') : (nomeO.value || 'O'); }
function atualizarStatus() { if (gameActive) status.textContent = `Vez do ${getNomeAtual()}`; }

function desfazerJogada() {
    if (historico.length === 0 || !gameActive) return;
    cells = historico.pop();
    if (modo.startsWith('pvb') && historico.length % 2 === 1) cells = historico.pop();
    currentPlayer = 'X';
    atualizarStatus();
    renderBoard();
}

/* SISTEMA REFEITO E OTIMIZADO PARA NÃO TRAVAR */
function jogadaPC() {
    if (!gameActive) return;
    let j = -1;
    const w = gerarWinConditions();
    
    // 1. Modo Fácil: 100% Aleatório rápido
    if (modo === 'pvb') {
        const l = cells.map((v, i) => v === '' ? i : null).filter(v => v !== null);
        j = l[Math.floor(Math.random() * l.length)];
    } 
    // 2. Modo Médio: Ataca ou defende de forma direta, se não houver nada faz jogada aleatória
    else if (modo === 'pvb-medio') {
        for (let c of w) {
            const v = c.map(i => cells[i]);
            if (v.filter(x => x === 'O').length === sequenciaVitoria - 1 && v.includes('')) { j = c[v.indexOf('')]; break; }
        }
        if (j === -1) {
            for (let c of w) {
                const v = c.map(i => cells[i]);
                if (v.filter(x => x === 'X').length === sequenciaVitoria - 1 && v.includes('')) { j = c[v.indexOf('')]; break; }
            }
        }
        if (j === -1) {
            const l = cells.map((v, i) => v === '' ? i : null).filter(v => v !== null);
            j = l[Math.floor(Math.random() * l.length)];
        }
    } 
    // 3. Modo Difícil com Limite de Profundidade + Poda Alfa-Beta (Sem Travamentos)
    else if (modo === 'pvb-dificil') {
        let maxProfundidade = tamanho === 3 ? 9 : tamanho === 4 ? 4 : 3; 
        j = melhorJogadaMinimax(maxProfundidade, w);
    }
    
    if (j !== -1) makeMove(j, true);
}

function melhorJogadaMinimax(maxProf, w) {
    let m = -Infinity, mj = -1;
    for (let i = 0; i < cells.length; i++) if (cells[i] === '') {
        cells[i] = 'O';
        let s = minimax(cells, 0, -Infinity, Infinity, false, maxProf, w);
        cells[i] = '';
        if (s > m) { m = s; mj = i; }
    }
    return mj;
}

/* Algoritmo Minimax com Poda Alfa-Beta para performance ultra-rápida */
function minimax(b, d, alfa, beta, max, maxProf, w) {
    const v = checarVencedorMinimax(b, w);
    if (v === 'O') return 10 - d;
    if (v === 'X') return d - 10;
    if (!b.includes('') || d >= maxProf) return 0;
    
    if (max) {
        let m = -Infinity;
        for (let i = 0; i < b.length; i++) if (b[i] === '') {
            b[i] = 'O';
            let s = minimax(b, d + 1, alfa, beta, false, maxProf, w);
            b[i] = '';
            m = Math.max(s, m);
            alfa = Math.max(alfa, m);
            if (beta <= alfa) break; // Poda Beta
        }
        return m;
    } else {
        let m = Infinity;
        for (let i = 0; i < b.length; i++) if (b[i] === '') {
            b[i] = 'X';
            let s = minimax(b, d + 1, alfa, beta, true, maxProf, w);
            b[i] = '';
            m = Math.min(s, m);
            beta = Math.min(beta, m);
            if (beta <= alfa) break; // Poda Alfa
        }
        return m;
    }
}

function checarVencedorMinimax(b, w) { for (let c of w) { const p = b[c[0]]; if (p && c.every(i => b[i] === p)) return p; } return null; }
function checkWinner() { const w = gerarWinConditions(); for (let c of w) { const p = cells[c[0]]; if (p && c.every(i => cells[i] === p)) return c; } return null; }

function atualizarPlacar() {
    scoreX.textContent = placar.X; scoreO.textContent = placar.O; scoreVelha.textContent = placar.Velha;
    localStorage.setItem('velha_placar', JSON.stringify(placar));
}

function resetRodada() {
    cells = Array(tamanho * tamanho).fill('');
    currentPlayer = 'X'; gameActive = true; historico = []; pcPensando = false;
    atualizarStatus(); renderBoard(); iniciarCronometro();
}

function zerarPlacar() { placar = {X: 0, O: 0, Velha: 0}; atualizarPlacar(); resetRodada(); }

atualizarLabels(); atualizarPlacar(); renderBoard(); iniciarCronometro();
</script>
</body>
</html>
